<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Echora · 登录</title>
<link rel="stylesheet" href="assets/chat-styles.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <!-- Brand -->
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
      <span style="width:36px;height:36px;border-radius:6px;background:var(--color-terracotta);display:grid;place-items:center;color:var(--color-white);font-family:var(--font-serif);font-weight:700;font-size:18px;">E</span>
      <div>
        <h1 style="font-size:22px; margin:0; font-weight:600;">Echora</h1>
        <p style="color:var(--color-stone); font-size:13px; margin:2px 0 0;">AI 英语对话教练</p>
      </div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs" style="margin-bottom: 24px;">
      <button class="is-active" data-tab="login">登录</button>
      <button data-tab="register">注册</button>
    </div>

    <!-- Login form -->
    <form id="login-form" style="display:flex; flex-direction:column; gap:16px;" onsubmit="event.preventDefault(); location.href='chat-onboarding.html';">
      <div class="field">
        <label class="field__label">邮箱</label>
        <input class="input" type="email" placeholder="your@email.com" value="xiaoming@example.com" />
      </div>
      <div class="field">
        <label class="field__label">密码</label>
        <input class="input" type="password" placeholder="输入密码" value="123456" />
      </div>
      <button class="btn btn--primary btn--block btn--large" type="submit" style="margin-top:4px;">
        登录 <i data-lucide="arrow-right"></i>
      </button>
    </form>

    <!-- Register form (hidden by default) -->
    <form id="register-form" style="display:none; flex-direction:column; gap:16px;" onsubmit="event.preventDefault(); location.href='chat-onboarding.html';">
      <div class="field">
        <label class="field__label">昵称</label>
        <input class="input" type="text" placeholder="怎么称呼你？" value="小明" />
      </div>
      <div class="field">
        <label class="field__label">邮箱</label>
        <input class="input" type="email" placeholder="your@email.com" value="xiaoming@example.com" />
      </div>
      <div class="field">
        <label class="field__label">密码</label>
        <input class="input" type="password" placeholder="至少 6 位" value="123456" />
      </div>
      <button class="btn btn--primary btn--block btn--large" type="submit" style="margin-top:4px;">
        注册并开始 <i data-lucide="arrow-right"></i>
      </button>
    </form>

    <p style="text-align:center; font-size:13px; color:var(--color-stone); margin:16px 0 0;">
      登录即表示同意服务条款。所有数据仅用于个性化学习推荐。
    </p>
  </div>
</div>

<script>
  // Tab switching
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      document.getElementById('login-form').style.display = btn.dataset.tab === 'login' ? 'flex' : 'none';
      document.getElementById('register-form').style.display = btn.dataset.tab === 'register' ? 'flex' : 'none';
    });
  });
  lucide.createIcons();
</script>
</body>
</html>
