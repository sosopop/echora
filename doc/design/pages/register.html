<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echora · 注册</title>
    <link rel="stylesheet" href="../styles/tokens.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <style>
      .auth-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .auth-side {
        background: var(--color-surface-dark);
        color: var(--color-on-dark);
        padding: 56px 48px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .auth-side .brand {
        font-family: var(--font-display);
        font-size: 22px;
        color: var(--color-on-dark);
        letter-spacing: -0.2px;
      }
      .auth-side h1 {
        font-size: 48px;
        line-height: 1.1;
        letter-spacing: -1px;
        margin: 64px 0 16px;
        color: var(--color-on-dark);
      }
      .auth-side p {
        font-size: 17px;
        line-height: 1.65;
        color: var(--color-on-dark-soft);
        max-width: 380px;
      }
      .feature-list {
        margin-top: 48px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .feature-list .row {
        gap: 12px;
        font-size: 14px;
        color: var(--color-on-dark);
      }
      .feature-list .dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--color-surface-dark-elevated);
        color: var(--color-primary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex: none;
      }
      .auth-form {
        padding: 56px 48px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .auth-form-inner {
        width: 100%;
        max-width: 380px;
      }
      .auth-form h2 {
        font-size: 32px;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
      }
      .auth-form .subtitle {
        color: var(--color-muted);
        font-size: 14px;
        margin-bottom: 32px;
      }
      .form-row { margin-bottom: 16px; }
      .footer-link {
        margin-top: 24px;
        font-size: 14px;
        color: var(--color-muted);
        text-align: center;
      }
      .footer-link a {
        color: var(--color-primary);
        font-weight: 500;
      }
      .strength {
        display: flex;
        gap: 4px;
        margin-top: 8px;
      }
      .strength span {
        flex: 1;
        height: 4px;
        background: var(--color-hairline);
        border-radius: var(--radius-pill);
      }
      .strength span.on { background: var(--color-success); }
      .strength-label {
        font-size: 12px;
        color: var(--color-muted);
        margin-top: 6px;
      }
      .terms {
        margin-top: 24px;
        font-size: 12px;
        color: var(--color-muted-soft);
        text-align: center;
        line-height: 1.5;
      }
      @media (max-width: 900px) {
        .auth-shell { grid-template-columns: 1fr; }
        .auth-side { padding: 32px 24px; }
        .auth-side h1 { font-size: 36px; margin-top: 32px; }
        .feature-list { display: none; }
        .auth-form { padding: 32px 24px; }
      }
    </style>
  </head>
  <body>
    <div class="auth-shell">
      <aside class="auth-side">
        <div class="brand">
          <span class="brand-mark">✱</span>
          Echora
        </div>
        <div>
          <h1>开启<br />你的英语对话练习</h1>
          <p>注册后,Echo 会用 60 秒了解你,生成第一组场景推荐。</p>
          <div class="feature-list">
            <div class="row"><span class="dot">✓</span>对话即界面 · 学习闭环全在一处</div>
            <div class="row"><span class="dot">✓</span>个性化场景 · 基于画像智能匹配</div>
            <div class="row"><span class="dot">✓</span>错题归因 · 12 类标签精准复盘</div>
            <div class="row"><span class="dot">✓</span>辅助追问 · 主线不被打断</div>
          </div>
        </div>
        <div class="caption" style="color: var(--color-on-dark-soft)">
          © 2026 Echora
        </div>
      </aside>

      <main class="auth-form">
        <div class="auth-form-inner">
          <h2 class="h-display">创建账号</h2>
          <div class="subtitle">2 分钟内开始第一道题</div>

          <div class="form-row">
            <label class="field-label" for="email">邮箱</label>
            <input
              id="email"
              class="input"
              type="email"
              placeholder="you@example.com"
            />
          </div>

          <div class="form-row">
            <label class="field-label" for="pwd">设置密码</label>
            <input
              id="pwd"
              class="input"
              type="password"
              placeholder="至少 8 位,含字母和数字"
              value="Echora2026"
            />
            <div class="strength">
              <span class="on"></span>
              <span class="on"></span>
              <span class="on"></span>
              <span></span>
            </div>
            <div class="strength-label">强度: 良好</div>
          </div>

          <div class="form-row">
            <label class="field-label" for="pwd2">确认密码</label>
            <input
              id="pwd2"
              class="input"
              type="password"
              placeholder="再输入一次"
            />
          </div>

          <div class="form-row">
            <label class="checkbox" style="display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--color-body); line-height: 1.5;">
              <input type="checkbox" checked style="margin-top: 2px; accent-color: var(--color-primary);" />
              <span>
                我已阅读并同意 <a href="#">服务条款</a> 与 <a href="#">隐私政策</a>
              </span>
            </label>
          </div>

          <button class="btn btn-primary btn-block btn-lg">创建账号</button>

          <div class="footer-link">
            已有账号? <a href="login.html">直接登录</a>
          </div>

          <div class="terms">
            注册后将进入 Onboarding,Echo 会通过对话了解你的姓名、年级与英语水平。
          </div>
        </div>
      </main>
    </div>
    <script src="../scripts/interactions.js"></script>
  </body>
</html>
