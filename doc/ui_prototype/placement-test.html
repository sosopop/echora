<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Echora · 初始水平测试</title>
<link rel="stylesheet" href="assets/styles.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<main class="center-shell" style="align-items: flex-start; padding: 40px 24px 80px;">
  <div style="width: 100%; max-width: 760px;">

    <header style="display:flex; align-items:center; justify-content: space-between; margin-bottom: 18px;">
      <a href="onboarding.html" style="display:flex; align-items:center; gap:8px; font-size:14px; color: var(--color-charcoal);">
        <i data-lucide="arrow-left"></i> 返回偏好设置
      </a>
      <span class="muted text-caption">第 <span id="cur">1</span> / <span id="total">10</span> 题</span>
    </header>

    <h1 style="font-size:24px; margin: 0 0 6px;">初始短测</h1>
    <p class="muted" style="margin:0 0 18px; font-size:14px;">
      共 <strong>10</strong> 题：3 道隐藏一空 · 4 道隐藏一半 · 3 道整句翻译。系统会综合自选基础分 <span class="mono">400</span> 与本次表现，给出初始 <span class="mono">difficultyScore</span>。
    </p>

    <div class="progress mt-2 mb-3"><div class="progress__bar" id="prog" style="width: 10%;"></div></div>

    <!-- Question shell -->
    <section class="card" id="question" style="padding: 28px 32px;">
      <div style="display:flex; gap:8px; flex-wrap: wrap; margin-bottom: 12px;">
        <span class="tag tag--stage" id="q-stage">阶段 1 · 隐藏一个空</span>
        <span class="tag tag--level">B1</span>
        <span class="tag tag--neutral" id="q-tag">vocabulary</span>
      </div>
      <p class="sentence__zh" id="q-zh">中文：你好，我想退掉这个充电器，因为它不能用。</p>
      <div class="sentence" id="q-en">
        Hi, I would like to <input class="input--blank" data-answer="return" />
        this charger because it does not work.
      </div>

      <div class="mt-3" style="display:flex; gap: 10px; flex-wrap: wrap; justify-content: space-between;">
        <div style="display:flex; gap:8px;">
          <button class="btn btn--ghost btn--small"><i data-lucide="lightbulb"></i> 看提示（-5 分）</button>
          <button class="btn btn--ghost btn--small"><i data-lucide="rotate-ccw"></i> 跳过</button>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn--secondary" id="prev"><i data-lucide="chevron-left"></i> 上一题</button>
          <button class="btn btn--primary" id="next">提交并下一题 <i data-lucide="chevron-right"></i></button>
        </div>
      </div>

      <div id="feedback" class="mt-3" style="display:none;"></div>
    </section>

    <p class="muted text-caption mt-3">
      <i data-lucide="shield" style="width:14px;height:14px;vertical-align:-2px;"></i>
      可以点击「跳过短测」直接进入：以自选基础分 400 进入，并在前 3 个场景中加大动态调节权重。
      <a href="placement-result.html" class="muted">提前结束测试 →</a>
    </p>
  </div>
</main>

<script>
lucide.createIcons();

const QUESTIONS = [
  {
    stage: 1, tag: 'vocabulary',
    zh: '你好，我想退掉这个充电器，因为它不能用。',
    template: 'Hi, I would like to {0} this charger because it does not work.',
    answers: ['return']
  },
  {
    stage: 1, tag: 'preposition',
    zh: '我对你们的退款政策感兴趣。',
    template: 'I am interested {0} your refund policy.',
    answers: ['in']
  },
  {
    stage: 1, tag: 'auxiliary_verb',
    zh: '今天我们什么时候开会？',
    template: 'What time {0} we have the meeting today?',
    answers: ['do']
  },
  {
    stage: 2, tag: 'sentence_structure',
    zh: '抱歉，我没赶上昨晚的火车。',
    template: 'Sorry, I {0} {1} catch the train {2} night.',
    answers: ['did', "n't", 'last']
  },
  {
    stage: 2, tag: 'tense',
    zh: '我已经在这家公司工作了三年。',
    template: 'I {0} {1} for this company {2} three years.',
    answers: ['have', 'worked', 'for']
  },
  {
    stage: 2, tag: 'collocation',
    zh: '能不能麻烦你帮我看一下这份报告？',
    template: 'Could you {0} a look {1} this report {2} me?',
    answers: ['take', 'at', 'for']
  },
  {
    stage: 2, tag: 'modal_verb',
    zh: '明天的会议你最好提前到场。',
    template: 'You {0} {1} arrive early {2} tomorrow’s meeting.',
    answers: ['had', 'better', 'for']
  },
  {
    stage: 3, tag: 'full_translation',
    zh: '你好，我想退掉这个充电器，因为它不能用。',
    template: '__SENTENCE__',
    reference: 'Hi, I would like to return this charger because it does not work.'
  },
  {
    stage: 3, tag: 'full_translation',
    zh: '抱歉打扰，请问怎么去最近的地铁站？',
    template: '__SENTENCE__',
    reference: 'Excuse me, could you tell me how to get to the nearest subway station?'
  },
  {
    stage: 3, tag: 'full_translation',
    zh: '我们能不能把会议改到下周三？',
    template: '__SENTENCE__',
    reference: 'Could we move the meeting to next Wednesday?'
  },
];

let idx = 0;
const stageMap = { 1: '阶段 1 · 隐藏一个空', 2: '阶段 2 · 隐藏一半空', 3: '阶段 3 · 整句翻译' };

function render() {
  const q = QUESTIONS[idx];
  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('total').textContent = QUESTIONS.length;
  document.getElementById('prog').style.width = ((idx + 1) / QUESTIONS.length * 100) + '%';
  document.getElementById('q-stage').textContent = stageMap[q.stage];
  document.getElementById('q-tag').textContent = q.tag;
  document.getElementById('q-zh').textContent = '中文：' + q.zh;

  const en = document.getElementById('q-en');
  if (q.template === '__SENTENCE__') {
    en.innerHTML = '<textarea class="textarea input--english" placeholder="请用英文写出整句翻译…"></textarea>';
  } else {
    let html = q.template;
    (q.answers || []).forEach((a, i) => {
      html = html.replace(`{${i}}`, `<input class="input--blank" data-i="${i}" />`);
    });
    en.innerHTML = html;
  }
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('prev').disabled = idx === 0;
  document.getElementById('next').textContent = idx === QUESTIONS.length - 1 ? '提交测试 →' : '提交并下一题';
}

function showFeedback() {
  const q = QUESTIONS[idx];
  const score = 60 + Math.floor(Math.random() * 35);
  const ok = score >= 75;
  const ref = q.reference || (q.answers || []).join(' / ');
  const fb = document.getElementById('feedback');
  fb.style.display = '';
  fb.innerHTML = `
    <div class="bubble bubble--grading ${ok ? '' : 'is-wrong'}" style="max-width: none;">
      <div class="bubble__role">
        <i data-lucide="${ok ? 'check-circle-2' : 'alert-circle'}"></i>
        ${ok ? '正确' : '部分正确'} · 得分 <strong>${score}</strong>
      </div>
      <div>参考答案：<span class="mono">${ref}</span></div>
      <div class="muted text-caption mt-1">该题用于初始定级，不计入难度调整曲线。</div>
    </div>
  `;
  if (window.lucide) window.lucide.createIcons();
}

document.getElementById('next').addEventListener('click', () => {
  showFeedback();
  setTimeout(() => {
    if (idx < QUESTIONS.length - 1) {
      idx += 1;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      location.href = 'placement-result.html';
    }
  }, 800);
});
document.getElementById('prev').addEventListener('click', () => {
  if (idx > 0) { idx -= 1; render(); }
});

render();
</script>
</body>
</html>
