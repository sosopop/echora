<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Echora · 登录</title>
<link rel="stylesheet" href="assets/styles.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<main class="center-shell">
  <div class="auth-card">
    <div class="auth-card__brand">
      <span class="sidebar__brand-mark" style="width:32px; height:32px;">E</span>
      <strong style="font-size:18px;">Echora</strong>
    </div>
    <h1>欢迎回来</h1>
    <p>用 AI 持续生成真实场景，把汉译英能力一句一句练扎实。</p>

    <div class="auth-tabs" role="tablist">
      <button class="is-active" data-tab="login">登录</button>
      <button data-tab="register">注册</button>
    </div>

    <form id="login-form" data-pane="login" style="display: flex; flex-direction: column; gap: 14px;">
      <div class="field">
        <label class="field__label" for="email">邮箱</label>
        <input class="input" id="email" type="email" placeholder="you@example.com" value="alex@echora.app" />
      </div>
      <div class="field">
        <label class="field__label" for="password">密码</label>
        <input class="input" id="password" type="password" placeholder="••••••••" value="********" />
        <span class="field__hint">使用 bcryptjs 哈希存储，登录返回 JWT。</span>
      </div>
      <div style="display:flex; align-items:center; justify-content: space-between; font-size: 13px;">
        <label style="display:flex; gap:6px; align-items:center; color: var(--color-charcoal);">
          <input type="checkbox" checked /> 30 天内保持登录
        </label>
        <a href="#" class="muted">忘记密码？</a>
      </div>
      <button class="btn btn--primary btn--block btn--large" type="submit">
        <i data-lucide="log-in"></i>
        进入 Echora
      </button>
      <a class="btn btn--ghost btn--block" href="onboarding.html">
        <i data-lucide="user-plus"></i>
        作为新用户继续 → 选择场景与难度
      </a>
      <a class="btn btn--ghost btn--block" href="dashboard.html">
        <i data-lucide="zap"></i>
        以游客身份进入 Dashboard
      </a>
    </form>

    <form id="register-form" data-pane="register" style="display: none; flex-direction: column; gap: 14px;">
      <div class="field">
        <label class="field__label">邮箱</label>
        <input class="input" type="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label class="field__label">昵称</label>
        <input class="input" type="text" placeholder="例如 Alex" />
      </div>
      <div class="field">
        <label class="field__label">密码</label>
        <input class="input" type="password" placeholder="至少 8 位" />
        <span class="field__hint">需包含字母与数字。</span>
      </div>
      <button class="btn btn--primary btn--block btn--large" type="submit">
        <i data-lucide="check"></i>
        创建账号
      </button>
    </form>

    <p class="text-caption muted" style="margin-top: 18px; text-align:center;">
      继续即表示你接受 Echora 的隐私与数据使用说明。
    </p>
  </div>

  <a href="index.html" style="position:fixed; top:18px; left:18px; font-size:13px; color: var(--color-stone);">← 返回原型导航</a>
</main>

<script>
  lucide.createIcons();
  document.querySelectorAll('.auth-tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.auth-tabs button').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      const pane = btn.dataset.tab;
      document.querySelectorAll('[data-pane]').forEach(p => {
        p.style.display = p.dataset.pane === pane ? 'flex' : 'none';
      });
    });
  });
  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    location.href = 'dashboard.html';
  });
  document.getElementById('register-form').addEventListener('submit', e => {
    e.preventDefault();
    location.href = 'onboarding.html';
  });
</script>
</body>
</html>
